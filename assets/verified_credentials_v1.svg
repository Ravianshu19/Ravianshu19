<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 265" width="100%" height="265" fill="none">
  <defs>
    <style>
      .mono { font-family: 'Share Tech Mono', 'Courier New', Courier, monospace; }
      .sans { font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif; }
    </style>
    <filter id="vc-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="vc-gold" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="vc-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F5FF"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
    <linearGradient id="silver-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#94A3B8"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <linearGradient id="bronze-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#CD7C3A"/>
      <stop offset="100%" stop-color="#92400E"/>
    </linearGradient>
  </defs>

  <!-- Outer panel -->
  <rect width="798" height="263" x="1" y="1" rx="12" fill="#0A0B10" stroke="url(#vc-grad)" stroke-width="1.5"/>

  <!-- Blueprint grid -->
  <path d="M0,30 L800,30 M0,60 L800,60 M0,90 L800,90 M0,120 L800,120 M0,150 L800,150 M0,180 L800,180 M0,210 L800,210 M0,240 L800,240" stroke="#fff" stroke-opacity="0.015" stroke-width="0.5"/>
  <path d="M100,0 L100,265 M200,0 L200,265 M300,0 L300,265 M400,0 L400,265 M500,0 L500,265 M600,0 L600,265 M700,0 L700,265" stroke="#fff" stroke-opacity="0.015" stroke-width="0.5"/>

  <!-- Corner brackets -->
  <path d="M15,6 L6,6 L6,15" stroke="#00F5FF" stroke-width="2" fill="none"/>
  <path d="M785,6 L794,6 L794,15" stroke="#A855F7" stroke-width="2" fill="none"/>
  <path d="M6,250 L6,259 L15,259" stroke="#A855F7" stroke-width="2" fill="none"/>
  <path d="M794,250 L794,259 L785,259" stroke="#00F5FF" stroke-width="2" fill="none"/>

  <!-- Section label -->
  <text x="25" y="35" class="mono" font-size="11" fill="#A855F7" letter-spacing="2" filter="url(#vc-purple)">◇ VERIFIED_CREDENTIALS</text>
  <line x1="25" y1="44" x2="775" y2="44" stroke="#fff" stroke-opacity="0.07" stroke-width="1"/>

  <!-- Table panel -->
  <rect x="20" y="53" width="760" height="196" rx="8" fill="#060810" stroke="#1E293B" stroke-width="1"/>

  <!-- Table header row -->
  <rect x="20" y="53" width="760" height="32" rx="8" fill="#0D1117"/>
  <rect x="20" y="73" width="760" height="12" fill="#0D1117"/>

  <!-- Column header text -->
  <text x="55" y="73" class="mono" font-size="10" fill="#475569" text-anchor="middle" letter-spacing="1">RANK</text>
  <text x="260" y="73" class="mono" font-size="10" fill="#475569" text-anchor="middle" letter-spacing="1">ACHIEVEMENT</text>
  <text x="605" y="73" class="mono" font-size="10" fill="#475569" text-anchor="middle" letter-spacing="1">RESULT</text>

  <!-- Vertical column dividers -->
  <line x1="90" y1="53" x2="90" y2="249" stroke="#1E293B" stroke-width="1"/>
  <line x1="430" y1="53" x2="430" y2="249" stroke="#1E293B" stroke-width="1"/>

  <!-- ─── ROW 1 (y=85 to y=138) — Gold ─── -->
  <line x1="20" y1="85" x2="780" y2="85" stroke="#1E293B" stroke-width="1"/>

  <!-- Gold badge -->
  <rect x="25" y="99" width="58" height="24" rx="4" fill="url(#gold-grad)"/>
  <text x="54" y="115" class="mono" font-size="9" fill="#FEF3C7" text-anchor="middle" font-weight="bold">1ST</text>

  <!-- R1 achievement -->
  <text x="103" y="111" class="sans" font-size="12" fill="#E2E8F0" font-weight="bold">Gridlock Hackathon 2.0</text>
  <rect x="103" y="117" width="52" height="14" rx="3" fill="#1A2E0A"/>
  <text x="129" y="127" class="mono" font-size="8" fill="#22C55E" text-anchor="middle">WINNER</text>

  <!-- R1 result -->
  <text x="443" y="108" class="mono" font-size="11" fill="#94A3B8">90.9% → 98.77% R²</text>
  <text x="443" y="124" class="mono" font-size="11" fill="#64748B">via tuned ensemble models</text>

  <!-- ─── ROW 2 (y=138 to y=191) — Silver ─── -->
  <line x1="20" y1="138" x2="780" y2="138" stroke="#1E293B" stroke-width="1"/>

  <!-- Silver badge -->
  <rect x="25" y="152" width="58" height="24" rx="4" fill="url(#silver-grad)"/>
  <text x="54" y="168" class="mono" font-size="9" fill="#F1F5F9" text-anchor="middle" font-weight="bold">2ND</text>

  <!-- R2 achievement -->
  <text x="103" y="162" class="sans" font-size="12" fill="#E2E8F0" font-weight="bold">Kaggle: Titanic Ensemble</text>
  <rect x="103" y="168" width="60" height="14" rx="3" fill="#0A1830"/>
  <text x="133" y="178" class="mono" font-size="8" fill="#00F5FF" text-anchor="middle">TOP 2%</text>

  <!-- R2 result -->
  <text x="443" y="160" class="mono" font-size="11" fill="#94A3B8">Top 2% leaderboard</text>
  <text x="443" y="176" class="mono" font-size="11" fill="#64748B">XGBoost + custom feature pipeline</text>

  <!-- ─── ROW 3 (y=191 to y=249) — Bronze ─── -->
  <line x1="20" y1="191" x2="780" y2="191" stroke="#1E293B" stroke-width="1"/>

  <!-- Bronze badge -->
  <rect x="25" y="205" width="58" height="24" rx="4" fill="url(#bronze-grad)"/>
  <text x="54" y="221" class="mono" font-size="9" fill="#FEF3C7" text-anchor="middle" font-weight="bold">3RD</text>

  <!-- R3 achievement -->
  <text x="103" y="216" class="sans" font-size="12" fill="#E2E8F0" font-weight="bold">Kaggle: Predict Future Sales</text>
  <rect x="103" y="222" width="60" height="14" rx="3" fill="#0A1830"/>
  <text x="133" y="232" class="mono" font-size="8" fill="#00F5FF" text-anchor="middle">TOP 5%</text>

  <!-- R3 result -->
  <text x="443" y="214" class="mono" font-size="11" fill="#94A3B8">Top 5% leaderboard</text>
  <text x="443" y="230" class="mono" font-size="11" fill="#64748B">rolling time-series + CatBoost regression</text>
</svg>

  <text x="38" y="135" class="mono" font-size="14" fill="#00F5FF" filter="url(#am-cyan)">Ravi Anshu</text>
  <text x="141" y="135" class="mono" font-size="14" fill="#334155"> — </text>
  <text x="167" y="135" class="mono" font-size="14" fill="#CBD5E1">AI Engineer</text>
  <text x="277" y="135" class="mono" font-size="14" fill="#334155"> × </text>
  <text x="301" y="135" class="mono" font-size="14" fill="#CBD5E1">Product Builder</text>

  <!-- Separator -->

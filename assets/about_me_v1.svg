  <!-- Row 1 -->
  <text x="38" y="186" class="mono" font-size="11" fill="#334155">•</text>
  <text x="52" y="186" class="mono" font-size="11" fill="#94A3B8">Backend Engineering</text>
  <text x="189" y="186" class="mono" font-size="11" fill="#1E3A4A">  →  </text>
  <text x="225" y="186" class="mono" font-size="11" fill="#00F5FF">FastAPI, Celery, Redis</text>
  <text x="375" y="186" class="mono" font-size="11" fill="#475569">  production pipelines</text>

  <!-- Row 2 -->
  <text x="38" y="203" class="mono" font-size="11" fill="#334155">•</text>
  <text x="52" y="203" class="mono" font-size="11" fill="#94A3B8">ML Inference &amp; XAI</text>
  <text x="189" y="203" class="mono" font-size="11" fill="#1E3A4A">  →  </text>
  <text x="225" y="203" class="mono" font-size="11" fill="#00F5FF">CatBoost, XGBoost, SHAP</text>
  <text x="389" y="203" class="mono" font-size="11" fill="#475569">  attribution</text>

  <!-- Row 3 -->
  <text x="38" y="220" class="mono" font-size="11" fill="#334155">•</text>
  <text x="52" y="220" class="mono" font-size="11" fill="#94A3B8">Agentic AI Systems</text>
  <text x="189" y="220" class="mono" font-size="11" fill="#1E3A4A">  →  </text>
  <text x="225" y="220" class="mono" font-size="11" fill="#A855F7">LangChain, LangGraph</text>
  <text x="371" y="220" class="mono" font-size="11" fill="#475569">  custom tool interfaces</text>

  <!-- Row 4 -->
  <text x="38" y="237" class="mono" font-size="11" fill="#334155">•</text>
  <text x="52" y="237" class="mono" font-size="11" fill="#94A3B8">Protocol Engineering</text>
  <text x="189" y="237" class="mono" font-size="11" fill="#1E3A4A">  →  </text>
  <text x="225" y="237" class="mono" font-size="11" fill="#A855F7">Model Context Protocol (MCP) servers</text>

  <!-- Status bar -->
  <line x1="20" y1="258" x2="780" y2="258" stroke="#1E293B" stroke-width="1"/>
  <circle cx="38" cy="270" r="4" fill="#22C55E" filter="url(#am-green)">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="50" y="274" class="mono" font-size="10" fill="#22C55E">SYSTEM ACTIVE</text>
  <text x="580" y="274" class="mono" font-size="10" fill="#1E293B">SYS_STATUS: STABLE  |  LOC: CHENNAI.IN</text>
</svg>
